name: Update Judicial Data

on:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 8am UTC
  workflow_dispatch:      # manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch updated judicial data
        run: node scripts/update-data.js

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/procesos.json
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: update judicial data [skip ci]" &&
            git push
          )
